<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Tempest Members Admin | まるて株式会社</title>
    <link rel="icon" href="/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            min-height: 100dvh;
            background: #070707;
            padding: 24px;
        }
        .admin-shell {
            width: min(100%, 1100px);
            margin: 0 auto;
            padding: 32px 0;
        }
        .admin-card {
            background: #111;
            border: 1px solid rgba(204, 190, 124, 0.25);
            border-radius: 8px;
            padding: 28px;
            margin-bottom: 18px;
        }
        .admin-title {
            color: var(--primary-gold);
            font-size: 1.5rem;
            letter-spacing: 0.1em;
            margin-bottom: 6px;
        }
        .toolbar {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            flex-wrap: wrap;
            margin-top: 18px;
        }
        .toolbar .form-group {
            flex: 1;
            min-width: 240px;
            margin-bottom: 0;
        }
        .member-row {
            display: grid;
            grid-template-columns: 1.2fr 0.9fr 0.8fr 0.9fr 0.9fr 1.8fr;
            gap: 12px;
            align-items: center;
            border-top: 1px solid #222;
            padding: 16px 0;
        }
        .ledger-head {
            color: #777;
            font-size: 0.76rem;
            padding-bottom: 8px;
        }
        .member-row:first-child { border-top: none; }
        .member-no { color: var(--primary-gold); font-weight: 700; }
        .muted { color: #777; font-size: 0.82rem; }
        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .quick-actions button {
            border: 1px solid rgba(204, 190, 124, 0.5);
            background: transparent;
            color: var(--primary-gold);
            padding: 9px 10px;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-secondary {
            border: 1px solid #333;
            background: transparent;
            color: #bbb;
            padding: 10px 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        .admin-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 18px;
        }
        .tab-button {
            border: 1px solid #333;
            background: #090909;
            color: #bbb;
            padding: 10px 14px;
            border-radius: 4px;
            cursor: pointer;
        }
        .tab-button.active {
            border-color: rgba(204, 190, 124, 0.65);
            color: var(--primary-gold);
        }
        .manual-form {
            display: grid;
            grid-template-columns: 90px 1fr auto;
            gap: 8px;
            width: 100%;
        }
        .manual-form input {
            min-width: 0;
            padding: 10px;
        }
        .history-box, .announcement-list {
            margin-top: 10px;
            padding: 12px;
            border: 1px solid #222;
            background: #070707;
            border-radius: 4px;
            color: #bbb;
            font-size: 0.85rem;
        }
        .announcement-form {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 18px;
        }
        .announcement-form .wide { grid-column: 1 / -1; }
        .date-picker-wrap {
            display: flex;
            gap: 8px;
            align-items: center;
            cursor: pointer;
        }
        .date-picker-wrap input[type="date"] {
            flex: 1;
            min-width: 0;
            cursor: pointer;
        }
        .date-picker-btn {
            border: 1px solid #333;
            background: #090909;
            color: #bbb;
            padding: 10px 12px;
            border-radius: 4px;
            white-space: nowrap;
            cursor: pointer;
        }
        select:disabled {
            opacity: 0.45;
            cursor: not-allowed;
        }
        @media (max-width: 900px) {
            .ledger-head { display: none; }
            .member-row { grid-template-columns: 1fr; }
            .manual-form { grid-template-columns: 1fr; }
            .announcement-form { grid-template-columns: 1fr; }
            .announcement-form .wide { grid-column: auto; }
        }
        .sp-text { display: none; }
        @media (max-width: 600px) {
            .sp-text { display: inline; }
            .pc-text { display: none; }
            body {
                padding: 12px;
            }
            .admin-card {
                padding: 16px;
            }
            .member-row {
                padding: 16px 8px;
            }
            .quick-actions {
                gap: 10px;
            }
            .quick-actions button {
                padding: 10px 14px;
                font-size: 0.9rem;
            }
            .memo-container {
                flex-direction: column;
                align-items: stretch !important;
                gap: 6px !important;
            }
            .memo-container input {
                width: 100% !important;
            }
            .memo-container button {
                width: 100% !important;
                padding: 10px !important;
                font-size: 0.95rem !important;
            }
        }
        .catalog-row {
            display: grid;
            grid-template-columns: 80px 1fr 60px auto;
            gap: 12px;
            align-items: center;
            border-top: 1px solid #222;
            padding: 12px 0;
        }
        @media (max-width: 600px) {
            .catalog-row {
                display: flex;
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }
            .catalog-row div {
                width: 100%;
            }
            #catalogForm {
                display: flex;
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }
        }
    </style>
</head>
<body>
    <main class="admin-shell">
        <section class="admin-card" id="loginCard">
            <h1 class="serif admin-title">Tempest Members</h1>
            <p class="muted">既存管理パスワードでログインしてください。</p>
            <form id="loginForm" class="toolbar">
                <div class="form-group">
                    <label>管理パスワード</label>
                    <input id="passwordInput" class="form-control" type="password" autocomplete="current-password" required>
                </div>
                <button class="btn-luxury" id="loginButton" type="submit">ログイン</button>
            </form>
            <div id="loginMessage" class="message"></div>
        </section>

        <section class="admin-card" id="adminPanel" style="display:none;">
            <h1 class="serif admin-title">Tempest 会員台帳</h1>
            <div class="admin-tabs">
                <button class="tab-button active" id="memberTabButton" type="button" onclick="showAdminTab('members')">会員一覧</button>
                <button class="tab-button" id="announcementTabButton" type="button" onclick="showAdminTab('announcements')">お知らせ・クーポン</button>
                <button class="tab-button" id="catalogTabButton" type="button" onclick="showAdminTab('catalog')">ポイント交換メニュー設定</button>
            </div>
            <div class="toolbar">
                <div class="form-group">
                    <label>会員を選択</label>
                    <select id="memberSelect" class="form-control" onchange="selectMemberFromDropdown()">
                        <option value="">全員を表示</option>
                    </select>
                </div>
                <button class="btn-luxury" type="button" onclick="logout()">ログアウト</button>
            </div>
        </section>

        <div id="memberTab">
            <section class="admin-card" id="memberList" style="display:none;"></section>
        </div>

        <section class="admin-card" id="catalogPanel" style="display:none;">
            <h1 class="serif admin-title">ポイント交換メニュー設定</h1>
            <p class="muted">会員ページで表示するポイント交換メニューを管理します。</p>
            <form id="catalogForm" onsubmit="event.preventDefault(); submitAddCatalog();" class="manual-form" style="grid-template-columns: 80px 1fr 60px auto; margin-bottom: 20px;">
                <input class="form-control" type="number" id="catalogPoints" placeholder="必要Pt" required>
                <input class="form-control" type="text" id="catalogTitle" placeholder="交換アイテム名" required>
                <input class="form-control" type="number" id="catalogOrder" placeholder="順序" value="0" required>
                <button class="btn-luxury" type="submit">追加</button>
            </form>
            <div id="catalogListContainer">
                読み込み中...
            </div>
        </section>

        <section class="admin-card" id="announcementPanel" style="display:none;">
            <h1 class="serif admin-title">お知らせ・クーポン</h1>
            <p class="muted">会員ページに表示するお知らせ・クーポンを登録します。</p>
            <form id="announcementForm" class="announcement-form">
                <div class="form-group">
                    <label>タイトル</label>
                    <input id="announcementTitle" class="form-control" maxlength="80" required>
                </div>
                <div class="form-group">
                    <label>対象</label>
                    <select id="announcementTargetType" class="form-control" onchange="updateAnnouncementTargetControls()">
                        <option value="all">全員</option>
                        <option value="birth_month">誕生月</option>
                        <option value="member">個別会員</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>誕生月</label>
                    <select id="announcementBirthMonth" class="form-control"></select>
                </div>
                <div class="form-group">
                    <label>個別会員番号</label>
                    <select id="announcementMemberNo" class="form-control">
                        <option value="">会員を選択</option>
                    </select>
                </div>
                <div class="form-group wide">
                    <label>本文</label>
                    <textarea id="announcementBody" class="form-control" rows="3" maxlength="500" required></textarea>
                </div>
                <div class="form-group">
                    <label>表示開始日</label>
                    <div class="date-picker-wrap" onclick="openDatePicker('announcementStartAt')">
                        <input id="announcementStartAt" class="form-control date-input" type="date">
                        <button class="date-picker-btn" type="button">日付を選択</button>
                    </div>
                </div>
                <div class="form-group">
                    <label>表示終了日</label>
                    <div class="date-picker-wrap" onclick="openDatePicker('announcementEndAt')">
                        <input id="announcementEndAt" class="form-control date-input" type="date">
                        <button class="date-picker-btn" type="button">日付を選択</button>
                    </div>
                </div>
                <button class="btn-luxury" type="submit">お知らせ登録</button>
            </form>
            <div id="announcementMessage" class="message"></div>
            <h2 style="color:var(--primary-gold); font-size:1rem; margin-top:22px;">登録済みのお知らせ</h2>
            <div id="announcementList" class="announcement-list"></div>
        </section>
    </main>

    <script>
        let currentToken = '';
        let latestMembers = [];

        function escapeHTML(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }

        function formatDate(value) {
            if (!value) return '未記録';
            return new Date(value).toLocaleString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
        }

        for (let month = 1; month <= 12; month += 1) {
            document.getElementById('announcementBirthMonth').insertAdjacentHTML('beforeend', `<option value="${month}">${month}月</option>`);
        }

        function showAdminTab(tabName) {
            const showMembers = tabName === 'members';
            const showAnnouncements = tabName === 'announcements';
            const showCatalog = tabName === 'catalog';

            document.getElementById('memberTab').style.display = showMembers ? 'block' : 'none';
            document.getElementById('announcementPanel').style.display = showAnnouncements ? 'block' : 'none';
            document.getElementById('catalogPanel').style.display = showCatalog ? 'block' : 'none';

            document.getElementById('memberTabButton').classList.toggle('active', showMembers);
            document.getElementById('announcementTabButton').classList.toggle('active', showAnnouncements);
            document.getElementById('catalogTabButton').classList.toggle('active', showCatalog);

            if (showAnnouncements) updateAnnouncementTargetControls();
            if (showCatalog) loadCatalog();
        }

        function openDatePicker(inputId) {
            const input = document.getElementById(inputId);
            if (!input) return;
            input.focus();
            if (typeof input.showPicker === 'function') {
                input.showPicker();
            }
        }

        function updateAnnouncementTargetControls() {
            const targetType = document.getElementById('announcementTargetType').value;
            const memberSelect = document.getElementById('announcementMemberNo');
            const isMemberTarget = targetType === 'member';
            memberSelect.disabled = !isMemberTarget;
            if (!isMemberTarget) {
                memberSelect.value = '';
            }
        }

        document.getElementById('loginForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const message = document.getElementById('loginMessage');
            const button = document.getElementById('loginButton');
            button.disabled = true;
            message.textContent = '確認中...';

            try {
                const response = await fetch('/api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: document.getElementById('passwordInput').value })
                });
                const result = await response.json();
                if (!response.ok || !result.token) {
                    throw new Error(result.error || 'ログインできませんでした');
                }
                currentToken = result.token;
                document.getElementById('passwordInput').value = '';
                document.getElementById('loginCard').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('memberList').style.display = 'block';
                showAdminTab('members');
                await loadMembers();
                await loadAnnouncements();
            } catch (error) {
                message.textContent = error.message;
                message.className = 'message error';
            } finally {
                button.disabled = false;
            }
        });

        function logout() {
            currentToken = '';
            location.reload();
        }

        async function loadMembers() {
            if (!currentToken) return;
            const list = document.getElementById('memberList');
            list.innerHTML = '<p class="muted">読み込み中...</p>';
            const selectedMemberNo = document.getElementById('memberSelect').value;

            try {
                const response = await fetch(`/api/members?q=${encodeURIComponent(selectedMemberNo)}`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                const result = await response.json();
                if (!response.ok) {
                    throw new Error(result.error || '会員一覧を取得できませんでした');
                }
                latestMembers = result.members || [];
                if (!selectedMemberNo) {
                    renderMemberOptions(latestMembers);
                }
                renderMembers(result.members || []);
            } catch (error) {
                list.innerHTML = `<p class="message error">${escapeHTML(error.message)}</p>`;
            }
        }

        function renderMemberOptions(members) {
            const announcementSelect = document.getElementById('announcementMemberNo');
            const memberSelect = document.getElementById('memberSelect');
            announcementSelect.innerHTML = '<option value="">会員を選択</option>' + members.map(member =>
                `<option value="${escapeHTML(member.memberNo)}">${escapeHTML(member.memberNo)} / ${escapeHTML(member.nickname)}</option>`
            ).join('');
            memberSelect.innerHTML = '<option value="">全員を表示</option>' + members.map(member =>
                `<option value="${escapeHTML(member.memberNo)}">${escapeHTML(member.memberNo)} / ${escapeHTML(member.nickname)} / ${member.birthMonth}月${member.birthDay}日</option>`
            ).join('');
        }

        function selectMemberFromDropdown() {
            loadMembers();
        }

        function renderMembers(members) {
            const list = document.getElementById('memberList');
            if (!members.length) {
                list.innerHTML = '<h2 class="serif admin-title">会員一覧</h2><p class="muted">登録済みの会員はまだありません。会員登録後、こちらに表示されます。</p>';
                return;
            }
            list.innerHTML = `
                <h2 class="serif admin-title">会員一覧</h2>
                <p class="muted">スプレッドシートのように、会員情報とポイント操作を一覧で確認できます。</p>
                <div class="member-row ledger-head">
                    <div>会員番号 / ニックネーム</div>
                    <div>誕生日</div>
                    <div>現在ポイント</div>
                    <div>来店回数</div>
                    <div>最終来店日</div>
                    <div>履歴 / ポイント増減</div>
                </div>
            ` + members.map(member => `
                <div class="member-row" data-member-no="${escapeHTML(member.memberNo)}">
                    <div>
                        <div class="member-no">${escapeHTML(member.memberNo)}</div>
                        <strong>${escapeHTML(member.nickname)}</strong>
                    </div>
                    <div>
                        <div class="muted">誕生日</div>
                        <strong>${member.birthMonth}/${member.birthDay}</strong>
                    </div>
                    <div>
                        <div class="muted">現在ポイント</div>
                        <strong>${member.points} pt</strong>
                    </div>
                    <div>
                        <div class="muted">来店回数</div>
                        <strong>${member.visitCount}回</strong>
                    </div>
                    <div class="muted">
                        最終来店<br>${formatDate(member.lastVisitAt)}
                    </div>
                    <div>
                        <div class="quick-actions">
                            <button type="button" onclick="addPoints('${escapeHTML(member.memberNo)}', 1, 'visit', '来店')">来店 +1</button>
                            <button type="button" ${member.visitCount <= 0 ? 'disabled style="opacity:0.5; cursor:not-allowed;"' : ''} onclick="cancelVisit('${escapeHTML(member.memberNo)}', '${escapeHTML(member.nickname)}', ${member.visitCount})">
                                <span class="pc-text">来店取消 -1</span>
                                <span class="sp-text">来店-1</span>
                            </button>
                            <button type="button" onclick="addPoints('${escapeHTML(member.memberNo)}', 2, 'companion', '同伴')">同伴 +2</button>
                            <button type="button" onclick="addPoints('${escapeHTML(member.memberNo)}', 3, 'bottle', 'ボトル')">ボトル +3</button>
                            <button type="button" onclick="loadHistory('${escapeHTML(member.memberNo)}')">履歴</button>
                            <button type="button" onclick="deleteMember('${escapeHTML(member.memberNo)}', '${escapeHTML(member.nickname)}')">削除</button>
                        </div>
                        <form class="manual-form" onsubmit="event.preventDefault(); submitManual(this, '${escapeHTML(member.memberNo)}');" style="margin-top:10px;">
                            <input class="form-control" name="delta" type="number" placeholder="増やす/減らす" required>
                            <input class="form-control" name="memo" maxlength="200" placeholder="理由メモ（必須）" required>
                            <button class="btn-luxury" type="submit">反映</button>
                        </form>
                        <div class="memo-container" style="margin-top:10px; display:flex; gap:8px; align-items:center;">
                            <input class="form-control memo-input" id="memo-input-${escapeHTML(member.memberNo)}" type="text" placeholder="管理者メモ（内部用）" value="${escapeHTML(member.adminMemo || '')}" style="flex:1; font-size:0.9rem;">
                            <button class="btn-secondary" type="button" style="padding: 4px 10px; font-size: 0.85rem;" onclick="saveMemo('${escapeHTML(member.memberNo)}')">保存</button>
                        </div>
                        <div class="history-box" id="history-${escapeHTML(member.memberNo)}" style="display:none;"></div>
                    </div>
                </div>
            `).join('');
        }

        async function loadHistory(memberNo) {
            const box = document.getElementById(`history-${memberNo}`);
            box.style.display = 'block';
            box.textContent = '履歴を読み込み中...';
            try {
                const response = await fetch(`/api/members/history?memberNo=${encodeURIComponent(memberNo)}`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                const result = await response.json();
                if (!response.ok) throw new Error(result.error || '履歴を取得できませんでした');
                box.innerHTML = result.logs && result.logs.length
                    ? result.logs.map(log => `<div>${formatDate(log.created_at)} / ${escapeHTML(log.reason)} / ${log.point_delta > 0 ? '+' : ''}${log.point_delta}pt ${log.memo ? `/ ${escapeHTML(log.memo)}` : ''}</div>`).join('')
                    : '履歴はありません。';
            } catch (error) {
                box.textContent = error.message;
            }
        }

        async function submitManual(form, memberNo) {
            const delta = Number(form.elements.delta.value);
            const memo = form.elements.memo.value;
            await addPoints(memberNo, delta, 'manual', '手動調整', memo);
            form.reset();
        }

        async function addPoints(memberNo, pointDelta, operationType, reason, memo = '') {
            if (!Number.isInteger(pointDelta) || pointDelta === 0) {
                alert('増減ポイントを整数で入力してください');
                return;
            }

            try {
                const response = await fetch('/api/members/points', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: currentToken,
                        memberNo,
                        pointDelta,
                        operationType,
                        reason,
                        memo
                    })
                });
                const result = await response.json();
                if (!response.ok) {
                    throw new Error(result.error || 'ポイント更新に失敗しました');
                }
                await loadMembers();
            } catch (error) {
                alert(error.message);
            }
        }

        async function deleteMember(memberNo, nickname) {
            if (!currentToken) return;
            const confirmed = confirm(`会員番号: ${memberNo}\nニックネーム: ${nickname}\n\nこの会員を本当に削除しますか？\n(削除するとログインおよびポイント付与ができなくなります)`);
            if (!confirmed) return;

            try {
                const response = await fetch('/api/members/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: currentToken,
                        memberNo
                    })
                });
                const result = await response.json();
                if (!response.ok) {
                    throw new Error(result.error || '会員の削除に失敗しました');
                }
                await loadMembers();
            } catch (error) {
                alert(error.message);
            }
        }

        async function cancelVisit(memberNo, nickname, visitCount) {
            if (!currentToken) return;
            if (Number(visitCount || 0) <= 0) {
                alert('来店回数が0回のため、来店取消はできません。');
                return;
            }

            const confirmed = confirm(`${nickname}様の来店回数とポイントを1ずつ戻します。よろしいですか？`);
            if (!confirmed) return;

            try {
                const response = await fetch('/api/members/points', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: currentToken,
                        memberNo,
                        pointDelta: -1,
                        operationType: 'visit_cancel',
                        reason: '来店取消 -1'
                    })
                });
                const result = await response.json();
                if (!response.ok) {
                    throw new Error(result.error || '来店取消に失敗しました');
                }
                await loadMembers();
            } catch (error) {
                alert(error.message);
            }
        }

        async function saveMemo(memberNo) {
            if (!currentToken) return;
            const adminMemo = document.getElementById(`memo-input-${memberNo}`).value;

            try {
                const response = await fetch('/api/members/update-memo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: currentToken,
                        memberNo,
                        adminMemo
                    })
                });
                const result = await response.json();
                if (!response.ok) {
                    throw new Error(result.error || 'メモの保存に失敗しました');
                }
                alert('メモを保存しました');
                await loadMembers();
            } catch (error) {
                alert(error.message);
            }
        }

        async function loadAnnouncements() {
            const list = document.getElementById('announcementList');
            list.textContent = '読み込み中...';
            try {
                const response = await fetch('/api/members/announcements', {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                const result = await response.json();
                if (!response.ok) throw new Error(result.error || 'お知らせを取得できませんでした');
                list.innerHTML = result.announcements && result.announcements.length
                    ? result.announcements.map(item => `
                        <div style="border-top:1px solid #222; padding:10px 0;">
                            <strong>${escapeHTML(item.title)}</strong>
                            <div style="white-space: pre-line;">${escapeHTML(item.body)}</div>
                            <div class="muted">${escapeHTML(targetLabel(item))} / ${item.is_active ? '有効' : '無効'}</div>
                            ${item.is_active ? `<button class="btn-secondary" type="button" style="margin-top:8px;" onclick="disableAnnouncement(${Number(item.id)})">無効にする</button>` : ''}
                        </div>
                    `).join('')
                    : 'お知らせはありません。';
            } catch (error) {
                list.textContent = error.message;
            }
        }

        function targetLabel(item) {
            if (item.target_type === 'birth_month') return `${item.target_birth_month}月生まれ`;
            if (item.target_type === 'member') return item.target_member_no ? `個別 ${item.target_member_no}` : '個別会員';
            return '全員';
        }

        async function disableAnnouncement(id) {
            if (!currentToken || !id) return;
            if (!confirm('このお知らせを無効にしますか？')) return;
            const message = document.getElementById('announcementMessage');
            message.textContent = '無効化中...';
            try {
                const response = await fetch('/api/members/announcements', {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify({ id, isActive: false })
                });
                const result = await response.json();
                if (!response.ok) throw new Error(result.error || '無効化できませんでした');
                message.textContent = '無効にしました';
                message.className = 'message success';
                await loadAnnouncements();
            } catch (error) {
                message.textContent = error.message;
                message.className = 'message error';
            }
        }

        document.getElementById('announcementForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const message = document.getElementById('announcementMessage');
            message.textContent = '登録中...';
            try {
                const response = await fetch('/api/members/announcements', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify({
                        title: document.getElementById('announcementTitle').value,
                        body: document.getElementById('announcementBody').value,
                        targetType: document.getElementById('announcementTargetType').value,
                        targetBirthMonth: document.getElementById('announcementBirthMonth').value,
                        targetMemberNo: document.getElementById('announcementTargetType').value === 'member' ? document.getElementById('announcementMemberNo').value : '',
                        startAt: document.getElementById('announcementStartAt').value,
                        endAt: document.getElementById('announcementEndAt').value,
                        isActive: true
                    })
                });
                const result = await response.json();
                if (!response.ok) throw new Error(result.error || '登録できませんでした');
                event.target.reset();
                updateAnnouncementTargetControls();
                message.textContent = '登録しました';
                message.className = 'message success';
                await loadAnnouncements();
            } catch (error) {
                message.textContent = error.message;
                message.className = 'message error';
            }
        });

        async function loadCatalog() {
            const container = document.getElementById('catalogListContainer');
            container.textContent = '読み込み中...';
            try {
                const response = await fetch(`/api/members/admin-point-catalog?token=${currentToken}`);
                const result = await response.json();
                if (!response.ok) throw new Error(result.error || 'ポイント交換メニューを取得できませんでした');

                if (!result.items || result.items.length === 0) {
                    container.textContent = 'ポイント交換メニューが登録されていません。';
                    return;
                }

                container.innerHTML = result.items.map(item => `
                    <div class="catalog-row">
                        <div style="display: flex; align-items: center; gap: 8px;">
                            <input class="form-control" type="number" id="edit-points-${item.id}" value="${item.points}" style="width: 70px;" required> Pt
                        </div>
                        <input class="form-control" type="text" id="edit-title-${item.id}" value="${escapeHTML(item.title)}" required>
                        <div style="display: flex; align-items: center; gap: 8px;">
                            順序<input class="form-control" type="number" id="edit-order-${item.id}" value="${item.display_order}" style="width: 60px;" required>
                        </div>
                        <div class="quick-actions" style="justify-content: flex-end;">
                            <button type="button" onclick="submitEditCatalog(${item.id})">更新</button>
                            <button type="button" class="${item.is_active ? 'btn-secondary' : 'btn-luxury'}" onclick="toggleCatalogActive(${item.id}, ${item.is_active})">
                                ${item.is_active ? '無効にする' : '有効にする'}
                            </button>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                container.textContent = error.message;
            }
        }

        async function submitAddCatalog() {
            if (!currentToken) return;
            const points = Number(document.getElementById('catalogPoints').value);
            const title = document.getElementById('catalogTitle').value;
            const displayOrder = Number(document.getElementById('catalogOrder').value);

            try {
                const response = await fetch('/api/members/admin-point-catalog', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: currentToken,
                        action: 'add',
                        points,
                        title,
                        displayOrder
                    })
                });
                const result = await response.json();
                if (!response.ok) throw new Error(result.error || '追加できませんでした');

                document.getElementById('catalogPoints').value = '';
                document.getElementById('catalogTitle').value = '';
                document.getElementById('catalogOrder').value = '0';
                await loadCatalog();
            } catch (error) {
                alert(error.message);
            }
        }

        async function submitEditCatalog(id) {
            if (!currentToken) return;
            const points = Number(document.getElementById(`edit-points-${id}`).value);
            const title = document.getElementById(`edit-title-${id}`).value;
            const displayOrder = Number(document.getElementById(`edit-order-${id}`).value);

            try {
                const response = await fetch('/api/members/admin-point-catalog', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: currentToken,
                        action: 'edit',
                        id,
                        points,
                        title,
                        displayOrder
                    })
                });
                const result = await response.json();
                if (!response.ok) throw new Error(result.error || '更新できませんでした');
                alert('更新しました');
                await loadCatalog();
            } catch (error) {
                alert(error.message);
            }
        }

        async function toggleCatalogActive(id, currentActive) {
            if (!currentToken) return;
            const nextActive = currentActive ? 0 : 1;

            try {
                const response = await fetch('/api/members/admin-point-catalog', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: currentToken,
                        action: 'toggle_active',
                        id,
                        isActive: nextActive
                    })
                });
                const result = await response.json();
                if (!response.ok) throw new Error(result.error || '切り替えできませんでした');
                await loadCatalog();
            } catch (error) {
                alert(error.message);
            }
        }
    </script>
</body>
</html>
