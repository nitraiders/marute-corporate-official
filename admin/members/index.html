<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Tempest Members Admin | まるて株式会社</title>
    <link rel="icon" href="/favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            min-height: 100dvh;
            background: #070707;
            padding: 24px;
        }
        .admin-shell {
            width: min(100%, 1100px);
            margin: 0 auto;
            padding: 32px 0;
        }
        .admin-card {
            background: #111;
            border: 1px solid rgba(204, 190, 124, 0.25);
            border-radius: 8px;
            padding: 28px;
            margin-bottom: 18px;
        }
        .admin-title {
            color: var(--primary-gold);
            font-size: 1.5rem;
            letter-spacing: 0.1em;
            margin-bottom: 6px;
        }
        .toolbar {
            display: flex;
            gap: 12px;
            align-items: flex-end;
            flex-wrap: wrap;
            margin-top: 18px;
        }
        .toolbar .form-group {
            flex: 1;
            min-width: 240px;
            margin-bottom: 0;
        }
        .member-row {
            display: grid;
            grid-template-columns: 1.2fr 0.9fr 0.8fr 0.9fr 0.9fr 1.8fr;
            gap: 12px;
            align-items: center;
            border-top: 1px solid #222;
            padding: 16px 0;
        }
        .ledger-head {
            color: #777;
            font-size: 0.76rem;
            padding-bottom: 8px;
        }
        .member-row:first-child { border-top: none; }
        .member-no { color: var(--primary-gold); font-weight: 700; }
        .muted { color: #777; font-size: 0.82rem; }
        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .quick-actions button {
            border: 1px solid rgba(204, 190, 124, 0.5);
            background: transparent;
            color: var(--primary-gold);
            padding: 9px 10px;
            border-radius: 4px;
            cursor: pointer;
        }
        .btn-secondary {
            border: 1px solid #333;
            background: transparent;
            color: #bbb;
            padding: 10px 12px;
            border-radius: 4px;
            cursor: pointer;
        }
        .admin-tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 18px;
        }
        .tab-button {
            border: 1px solid #333;
            background: #090909;
            color: #bbb;
            padding: 10px 14px;
            border-radius: 4px;
            cursor: pointer;
        }
        .tab-button.active {
            border-color: rgba(204, 190, 124, 0.65);
            color: var(--primary-gold);
        }
        .manual-form {
            display: grid;
            grid-template-columns: 90px 1fr auto;
            gap: 8px;
            width: 100%;
        }
        .manual-form input {
            min-width: 0;
            padding: 10px;
        }
        .history-box, .announcement-list {
            margin-top: 10px;
            padding: 12px;
            border: 1px solid #222;
            background: #070707;
            border-radius: 4px;
            color: #bbb;
            font-size: 0.85rem;
        }
        .announcement-form {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-top: 18px;
        }
        .announcement-form .wide { grid-column: 1 / -1; }
        @media (max-width: 900px) {
            .ledger-head { display: none; }
            .member-row { grid-template-columns: 1fr; }
            .manual-form { grid-template-columns: 1fr; }
            .announcement-form { grid-template-columns: 1fr; }
            .announcement-form .wide { grid-column: auto; }
        }
    </style>
</head>
<body>
    <main class="admin-shell">
        <section class="admin-card" id="loginCard">
            <h1 class="serif admin-title">Tempest Members</h1>
            <p class="muted">既存管理パスワードでログインしてください。</p>
            <form id="loginForm" class="toolbar">
                <div class="form-group">
                    <label>管理パスワード</label>
                    <input id="passwordInput" class="form-control" type="password" autocomplete="current-password" required>
                </div>
                <button class="btn-luxury" id="loginButton" type="submit">ログイン</button>
            </form>
            <div id="loginMessage" class="message"></div>
        </section>

        <section class="admin-card" id="adminPanel" style="display:none;">
            <h1 class="serif admin-title">Tempest 会員台帳</h1>
            <p class="muted">会員情報、現在ポイント、来店履歴、ポイント増減をこの画面で確認・操作します。</p>
            <div class="admin-tabs">
                <button class="tab-button active" id="memberTabButton" type="button" onclick="showAdminTab('members')">会員一覧</button>
                <button class="tab-button" id="announcementTabButton" type="button" onclick="showAdminTab('announcements')">お知らせ・クーポン</button>
            </div>
            <div class="toolbar">
                <div class="form-group">
                    <label>会員を選択</label>
                    <select id="memberSelect" class="form-control" onchange="selectMemberFromDropdown()">
                        <option value="">全員を表示</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>ニックネーム / 会員番号で検索</label>
                    <input id="searchInput" class="form-control" placeholder="MRT-0001 / ニックネーム">
                </div>
                <button class="btn-luxury" type="button" onclick="loadMembers()">検索</button>
                <button class="btn-luxury" type="button" onclick="logout()">ログアウト</button>
            </div>
        </section>

        <div id="memberTab">
            <section class="admin-card" id="memberList" style="display:none;"></section>
        </div>

        <section class="admin-card" id="announcementPanel" style="display:none;">
            <h1 class="serif admin-title">お知らせ・クーポン</h1>
            <p class="muted">会員ページに表示するお知らせ・クーポンを登録します。</p>
            <form id="announcementForm" class="announcement-form">
                <div class="form-group">
                    <label>タイトル</label>
                    <input id="announcementTitle" class="form-control" maxlength="80" required>
                </div>
                <div class="form-group">
                    <label>対象</label>
                    <select id="announcementTargetType" class="form-control">
                        <option value="all">全員</option>
                        <option value="birth_month">誕生月</option>
                        <option value="member">個別会員</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>誕生月</label>
                    <select id="announcementBirthMonth" class="form-control"></select>
                </div>
                <div class="form-group">
                    <label>個別会員番号</label>
                    <select id="announcementMemberNo" class="form-control">
                        <option value="">会員を選択</option>
                    </select>
                </div>
                <div class="form-group wide">
                    <label>本文</label>
                    <textarea id="announcementBody" class="form-control" rows="3" maxlength="500" required></textarea>
                </div>
                <div class="form-group">
                    <label>表示開始日</label>
                    <input id="announcementStartAt" class="form-control" type="date">
                </div>
                <div class="form-group">
                    <label>表示終了日</label>
                    <input id="announcementEndAt" class="form-control" type="date">
                </div>
                <div class="form-group">
                    <label>表示する</label>
                    <input id="announcementActive" type="checkbox" checked>
                </div>
                <button class="btn-luxury" type="submit">お知らせ登録</button>
            </form>
            <div id="announcementMessage" class="message"></div>
            <h2 style="color:var(--primary-gold); font-size:1rem; margin-top:22px;">登録済みのお知らせ</h2>
            <div id="announcementList" class="announcement-list"></div>
        </section>
    </main>

    <script>
        let currentToken = '';
        let latestMembers = [];

        function escapeHTML(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
        }

        function formatDate(value) {
            if (!value) return '未記録';
            return new Date(value).toLocaleString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
        }

        for (let month = 1; month <= 12; month += 1) {
            document.getElementById('announcementBirthMonth').insertAdjacentHTML('beforeend', `<option value="${month}">${month}月</option>`);
        }

        function showAdminTab(tabName) {
            const showMembers = tabName === 'members';
            document.getElementById('memberTab').style.display = showMembers ? 'block' : 'none';
            document.getElementById('announcementPanel').style.display = showMembers ? 'none' : 'block';
            document.getElementById('memberTabButton').classList.toggle('active', showMembers);
            document.getElementById('announcementTabButton').classList.toggle('active', !showMembers);
        }

        document.getElementById('loginForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const message = document.getElementById('loginMessage');
            const button = document.getElementById('loginButton');
            button.disabled = true;
            message.textContent = '確認中...';

            try {
                const response = await fetch('/api/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: document.getElementById('passwordInput').value })
                });
                const result = await response.json();
                if (!response.ok || !result.token) {
                    throw new Error(result.error || 'ログインできませんでした');
                }
                currentToken = result.token;
                document.getElementById('passwordInput').value = '';
                document.getElementById('loginCard').style.display = 'none';
                document.getElementById('adminPanel').style.display = 'block';
                document.getElementById('memberList').style.display = 'block';
                showAdminTab('members');
                await loadMembers();
                await loadAnnouncements();
            } catch (error) {
                message.textContent = error.message;
                message.className = 'message error';
            } finally {
                button.disabled = false;
            }
        });

        function logout() {
            currentToken = '';
            location.reload();
        }

        async function loadMembers() {
            if (!currentToken) return;
            const list = document.getElementById('memberList');
            list.innerHTML = '<p class="muted">読み込み中...</p>';
            const query = document.getElementById('searchInput').value.trim();

            try {
                const response = await fetch(`/api/members?q=${encodeURIComponent(query)}`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                const result = await response.json();
                if (!response.ok) {
                    throw new Error(result.error || '会員一覧を取得できませんでした');
                }
                latestMembers = result.members || [];
                if (!query) {
                    renderMemberOptions(latestMembers);
                }
                renderMembers(result.members || []);
            } catch (error) {
                list.innerHTML = `<p class="message error">${escapeHTML(error.message)}</p>`;
            }
        }

        function renderMemberOptions(members) {
            const announcementSelect = document.getElementById('announcementMemberNo');
            const memberSelect = document.getElementById('memberSelect');
            announcementSelect.innerHTML = '<option value="">会員を選択</option>' + members.map(member =>
                `<option value="${escapeHTML(member.memberNo)}">${escapeHTML(member.memberNo)} / ${escapeHTML(member.nickname)}</option>`
            ).join('');
            memberSelect.innerHTML = '<option value="">全員を表示</option>' + members.map(member =>
                `<option value="${escapeHTML(member.memberNo)}">${escapeHTML(member.memberNo)} / ${escapeHTML(member.nickname)} / ${member.birthMonth}月${member.birthDay}日</option>`
            ).join('');
        }

        function selectMemberFromDropdown() {
            const selectedMemberNo = document.getElementById('memberSelect').value;
            document.getElementById('searchInput').value = selectedMemberNo;
            loadMembers();
        }

        function renderMembers(members) {
            const list = document.getElementById('memberList');
            if (!members.length) {
                list.innerHTML = '<p class="muted">会員が見つかりません。</p>';
                return;
            }
            list.innerHTML = `
                <h2 style="color:var(--primary-gold); font-size:1rem; margin-bottom:12px;">会員一覧</h2>
                <p class="muted">スプレッドシートのように、会員情報とポイント操作を一覧で確認できます。</p>
                <div class="member-row ledger-head">
                    <div>会員番号 / ニックネーム</div>
                    <div>誕生日</div>
                    <div>現在ポイント</div>
                    <div>来店回数</div>
                    <div>最終来店日</div>
                    <div>履歴 / ポイント増減</div>
                </div>
            ` + members.map(member => `
                <div class="member-row" data-member-no="${escapeHTML(member.memberNo)}">
                    <div>
                        <div class="member-no">${escapeHTML(member.memberNo)}</div>
                        <strong>${escapeHTML(member.nickname)}</strong>
                    </div>
                    <div>
                        <div class="muted">誕生日</div>
                        <strong>${member.birthMonth}/${member.birthDay}</strong>
                    </div>
                    <div>
                        <div class="muted">現在ポイント</div>
                        <strong>${member.points} pt</strong>
                    </div>
                    <div>
                        <div class="muted">来店回数</div>
                        <strong>${member.visitCount}回</strong>
                    </div>
                    <div class="muted">
                        最終来店<br>${formatDate(member.lastVisitAt)}
                    </div>
                    <div>
                        <div class="quick-actions">
                            <button type="button" onclick="addPoints('${escapeHTML(member.memberNo)}', 1, 'visit', '来店')">来店 +1</button>
                            <button type="button" onclick="addPoints('${escapeHTML(member.memberNo)}', 3, 'companion', '同伴')">同伴 +3</button>
                            <button type="button" onclick="addPoints('${escapeHTML(member.memberNo)}', 5, 'bottle', 'ボトル')">ボトル +5</button>
                            <button type="button" onclick="loadHistory('${escapeHTML(member.memberNo)}')">履歴</button>
                        </div>
                        <form class="manual-form" onsubmit="event.preventDefault(); submitManual(this, '${escapeHTML(member.memberNo)}');" style="margin-top:10px;">
                            <input class="form-control" name="delta" type="number" placeholder="増やす/減らす" required>
                            <input class="form-control" name="memo" maxlength="200" placeholder="理由メモ（必須）" required>
                            <button class="btn-luxury" type="submit">反映</button>
                        </form>
                        <div class="history-box" id="history-${escapeHTML(member.memberNo)}" style="display:none;"></div>
                    </div>
                </div>
            `).join('');
        }

        async function loadHistory(memberNo) {
            const box = document.getElementById(`history-${memberNo}`);
            box.style.display = 'block';
            box.textContent = '履歴を読み込み中...';
            try {
                const response = await fetch(`/api/members/history?memberNo=${encodeURIComponent(memberNo)}`, {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                const result = await response.json();
                if (!response.ok) throw new Error(result.error || '履歴を取得できませんでした');
                box.innerHTML = result.logs && result.logs.length
                    ? result.logs.map(log => `<div>${formatDate(log.created_at)} / ${escapeHTML(log.reason)} / ${log.point_delta > 0 ? '+' : ''}${log.point_delta}pt ${log.memo ? `/ ${escapeHTML(log.memo)}` : ''}</div>`).join('')
                    : '履歴はありません。';
            } catch (error) {
                box.textContent = error.message;
            }
        }

        async function submitManual(form, memberNo) {
            const delta = Number(form.elements.delta.value);
            const memo = form.elements.memo.value;
            await addPoints(memberNo, delta, 'manual', '手動調整', memo);
            form.reset();
        }

        async function addPoints(memberNo, pointDelta, operationType, reason, memo = '') {
            if (!Number.isInteger(pointDelta) || pointDelta === 0) {
                alert('増減ポイントを整数で入力してください');
                return;
            }

            try {
                const response = await fetch('/api/members/points', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        token: currentToken,
                        memberNo,
                        pointDelta,
                        operationType,
                        reason,
                        memo
                    })
                });
                const result = await response.json();
                if (!response.ok) {
                    throw new Error(result.error || 'ポイント更新に失敗しました');
                }
                await loadMembers();
            } catch (error) {
                alert(error.message);
            }
        }

        async function loadAnnouncements() {
            const list = document.getElementById('announcementList');
            list.textContent = '読み込み中...';
            try {
                const response = await fetch('/api/members/announcements', {
                    headers: { 'Authorization': `Bearer ${currentToken}` }
                });
                const result = await response.json();
                if (!response.ok) throw new Error(result.error || 'お知らせを取得できませんでした');
                list.innerHTML = result.announcements && result.announcements.length
                    ? result.announcements.map(item => `
                        <div style="border-top:1px solid #222; padding:10px 0;">
                            <strong>${escapeHTML(item.title)}</strong>
                            <div>${escapeHTML(item.body)}</div>
                            <div class="muted">${escapeHTML(targetLabel(item))} / ${item.is_active ? '有効' : '無効'}</div>
                            ${item.is_active ? `<button class="btn-secondary" type="button" style="margin-top:8px;" onclick="disableAnnouncement(${Number(item.id)})">無効にする</button>` : ''}
                        </div>
                    `).join('')
                    : 'お知らせはありません。';
            } catch (error) {
                list.textContent = error.message;
            }
        }

        function targetLabel(item) {
            if (item.target_type === 'birth_month') return `${item.target_birth_month}月生まれ`;
            if (item.target_type === 'member') return item.target_member_no ? `個別 ${item.target_member_no}` : '個別会員';
            return '全員';
        }

        async function disableAnnouncement(id) {
            if (!currentToken || !id) return;
            if (!confirm('このお知らせを無効にしますか？')) return;
            const message = document.getElementById('announcementMessage');
            message.textContent = '無効化中...';
            try {
                const response = await fetch('/api/members/announcements', {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify({ id, isActive: false })
                });
                const result = await response.json();
                if (!response.ok) throw new Error(result.error || '無効化できませんでした');
                message.textContent = '無効にしました';
                message.className = 'message success';
                await loadAnnouncements();
            } catch (error) {
                message.textContent = error.message;
                message.className = 'message error';
            }
        }

        document.getElementById('announcementForm').addEventListener('submit', async (event) => {
            event.preventDefault();
            const message = document.getElementById('announcementMessage');
            message.textContent = '登録中...';
            try {
                const response = await fetch('/api/members/announcements', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${currentToken}`
                    },
                    body: JSON.stringify({
                        title: document.getElementById('announcementTitle').value,
                        body: document.getElementById('announcementBody').value,
                        targetType: document.getElementById('announcementTargetType').value,
                        targetBirthMonth: document.getElementById('announcementBirthMonth').value,
                        targetMemberNo: document.getElementById('announcementMemberNo').value,
                        startAt: document.getElementById('announcementStartAt').value,
                        endAt: document.getElementById('announcementEndAt').value,
                        isActive: document.getElementById('announcementActive').checked
                    })
                });
                const result = await response.json();
                if (!response.ok) throw new Error(result.error || '登録できませんでした');
                event.target.reset();
                document.getElementById('announcementActive').checked = true;
                message.textContent = '登録しました';
                message.className = 'message success';
                await loadAnnouncements();
            } catch (error) {
                message.textContent = error.message;
                message.className = 'message error';
            }
        });
    </script>
</body>
</html>
